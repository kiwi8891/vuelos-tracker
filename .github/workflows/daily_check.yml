name: Daily Flight Price Check

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 09:00 CET / 09:00 CEST
  workflow_dispatch:        # permite lanzar manualmente desde GitHub

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flight tracker
        env:
          SERPAPI_KEY:        ${{ secrets.SERPAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python flight_tracker.py

      - name: Commit updated prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.csv
          git diff --cached --quiet || git commit -m "chore: update prices $(date -u +%Y-%m-%d)"
          git push
